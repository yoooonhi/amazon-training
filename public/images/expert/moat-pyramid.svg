<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="1000" height="720" fill="#fafafa"/>
  <text x="500" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#23289e">四维护城河：越往下越难被抄</text>

  <!-- 金字塔四层（从顶到底） -->
  <!-- 第1层：数据壁垒（最易建） -->
  <polygon points="380,110 620,110 580,210 420,210" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="150" text-anchor="middle" font-size="18" font-weight="700" fill="#1e40af">数据壁垒</text>
  <text x="500" y="178" text-anchor="middle" font-size="14" fill="#1e40af">评论300+ · 复购率15%+</text>
  <text x="500" y="198" text-anchor="middle" font-size="12" fill="#666">易建 · 6-12个月</text>

  <!-- 第2层：品牌壁垒 -->
  <polygon points="340,210 660,210 610,330 390,330" fill="#fcd34d" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="255" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">品牌壁垒</text>
  <text x="500" y="283" text-anchor="middle" font-size="14" fill="#92400e">品牌词搜索占比15-25%</text>
  <text x="500" y="303" text-anchor="middle" font-size="12" fill="#666">中难 · 12-24个月</text>

  <!-- 第3层：供应链壁垒 -->
  <polygon points="300,330 700,330 640,470 360,470" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="380" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">供应链壁垒</text>
  <text x="500" y="408" text-anchor="middle" font-size="14" fill="#14532d">成本比跟随者低15% · 独家模具</text>
  <text x="500" y="428" text-anchor="middle" font-size="12" fill="#666">较难 · 6-18个月</text>

  <!-- 第4层：产品壁垒（最难建也最难抄） -->
  <polygon points="260,470 740,470 670,630 330,630" fill="#f9a8d4" stroke="#db2777" stroke-width="2"/>
  <text x="500" y="525" text-anchor="middle" font-size="18" font-weight="700" fill="#831843">产品壁垒</text>
  <text x="500" y="553" text-anchor="middle" font-size="14" fill="#831843">专利 · 独家开模 · 功能集成</text>
  <text x="500" y="573" text-anchor="middle" font-size="12" fill="#666">最难 · 12-36个月 · 抄不动</text>

  <!-- 左侧难度标注 -->
  <line x1="200" y1="160" x2="200" y2="580" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#999"/></marker></defs>
  <text x="185" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#666" transform="rotate(-90 185 370)">被抄袭难度递增</text>

  <!-- 右侧建设成本标注 -->
  <line x1="820" y1="580" x2="820" y2="160" stroke="#999" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <defs><marker id="arrow2" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#999"/></marker></defs>
  <text x="835" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#666" transform="rotate(90 835 370)">建设投入递增</text>

  <!-- 底部说明 -->
  <rect x="0" y="650" width="1000" height="70" fill="#23289e"/>
  <text x="500" y="690" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">策略：Y1先建供应链+产品壁垒（快见效难被抄），Y2-Y3加码品牌+数据壁垒</text>
</svg>
