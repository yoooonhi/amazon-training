<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="1400" height="1000" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="700" y="55" text-anchor="middle" font-size="34" font-weight="700" fill="#23289e">ACOS 高的根因诊断树</text>
  <text x="700" y="90" text-anchor="middle" font-size="18" fill="#666">先诊断，再动手 —— 不要一看到 ACOS 高就降价</text>

  <!-- 根节点：ACOS 高 -->
  <rect x="560" y="120" width="280" height="60" rx="30" fill="#23289e"/>
  <text x="700" y="158" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">ACOS 高</text>

  <!-- 连接线 -->
  <line x1="700" y1="180" x2="700" y2="220" stroke="#999" stroke-width="2"/>

  <!-- 第一步：CTR 检查 -->
  <rect x="540" y="220" width="320" height="60" rx="8" fill="#fff" stroke="#23289e" stroke-width="2"/>
  <text x="700" y="258" text-anchor="middle" font-size="20" font-weight="600" fill="#23289e">第一步：CTR 正常吗？</text>
  <text x="700" y="302" text-anchor="middle" font-size="15" fill="#888">参考：站点均值 0.2%-0.5%</text>

  <!-- 分叉线 -->
  <line x1="700" y1="320" x2="320" y2="360" stroke="#dc2626" stroke-width="2"/>
  <line x1="700" y1="320" x2="1080" y2="360" stroke="#999" stroke-width="2"/>

  <!-- 左分支：CTR 偏低 -->
  <rect x="120" y="360" width="400" height="130" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="320" y="395" text-anchor="middle" font-size="20" font-weight="700" fill="#dc2626">CTR 偏低（&lt; 0.2%）</text>
  <text x="320" y="425" text-anchor="middle" font-size="16" fill="#444">根因：主图 / 标题 / 价格</text>
  <text x="320" y="450" text-anchor="middle" font-size="16" fill="#444">不吸引人</text>
  <text x="320" y="478" text-anchor="middle" font-size="15" font-weight="600" fill="#dc2626">→ 根因不在广告，改 Listing</text>

  <!-- 右分支：CTR 正常 -->
  <rect x="880" y="360" width="400" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="1080" y="405" text-anchor="middle" font-size="20" font-weight="600" fill="#16a34a">CTR 正常 → 进入第二步</text>

  <!-- 连接到第二步 -->
  <line x1="1080" y1="430" x2="1080" y2="475" stroke="#999" stroke-width="2"/>
  <line x1="1080" y1="475" x2="700" y2="475" stroke="#999" stroke-width="2"/>
  <line x1="700" y1="475" x2="700" y2="510" stroke="#999" stroke-width="2"/>

  <!-- 第二步：CVR 检查 -->
  <rect x="540" y="510" width="320" height="60" rx="8" fill="#fff" stroke="#23289e" stroke-width="2"/>
  <text x="700" y="548" text-anchor="middle" font-size="20" font-weight="600" fill="#23289e">第二步：CVR 正常吗？</text>
  <text x="700" y="592" text-anchor="middle" font-size="15" fill="#888">参考：行业均值 70% 以上</text>

  <!-- 分叉 -->
  <line x1="700" y1="610" x2="320" y2="650" stroke="#dc2626" stroke-width="2"/>
  <line x1="700" y1="610" x2="1080" y2="650" stroke="#999" stroke-width="2"/>

  <!-- 左：CVR 偏低 -->
  <rect x="120" y="650" width="400" height="150" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="320" y="685" text-anchor="middle" font-size="20" font-weight="700" fill="#dc2626">CVR 偏低</text>
  <text x="320" y="715" text-anchor="middle" font-size="15" fill="#444">查这 5 件事（按优先级）：</text>
  <text x="320" y="740" text-anchor="middle" font-size="14" fill="#555">① 评价星级 ② 价格 ③ A+</text>
  <text x="320" y="762" text-anchor="middle" font-size="14" fill="#555">④ 搜索词相关性 ⑤ 配送方式</text>
  <text x="320" y="788" text-anchor="middle" font-size="15" font-weight="600" fill="#dc2626">→ Listing 内功问题</text>

  <!-- 右：CVR 正常 -->
  <rect x="880" y="650" width="400" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="1080" y="695" text-anchor="middle" font-size="20" font-weight="600" fill="#16a34a">CVR 正常 → 进入第三步</text>

  <line x1="1080" y1="720" x2="1080" y2="755" stroke="#999" stroke-width="2"/>
  <line x1="1080" y1="755" x2="700" y2="755" stroke="#999" stroke-width="2"/>
  <line x1="700" y1="755" x2="700" y2="790" stroke="#999" stroke-width="2"/>

  <!-- 第三步：CPC -->
  <rect x="540" y="790" width="320" height="60" rx="8" fill="#fff" stroke="#23289e" stroke-width="2"/>
  <text x="700" y="828" text-anchor="middle" font-size="20" font-weight="600" fill="#23289e">第三步：CPC 偏高吗？</text>
  <line x1="700" y1="850" x2="700" y2="880" stroke="#dc2626" stroke-width="2"/>

  <rect x="440" y="880" width="520" height="90" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="700" y="915" text-anchor="middle" font-size="20" font-weight="700" fill="#dc2626">CPC 高</text>
  <text x="700" y="945" text-anchor="middle" font-size="16" fill="#444">→ 收匹配类型（Broad→Phrase→Exact）、降出价</text>

  <!-- 底部铁律 -->
  <rect x="0" y="985" width="1400" height="15" fill="#23289e"/>
</svg>
